<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Máquinas e Inventario - MIS Ver 1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@latest"></script>
    <style>
        body {
            background-image: url(https://amariemagazine.com/wp-content/uploads/2022/08/Produccio%CC%81n-en-Global-mattress-1170x780.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        .login-title {
            color: white;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            padding-top: 1.5rem;
            margin-bottom: 2rem;
            order: 1;
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 0.75rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: fit-content;
            max-width: 90%;
            margin-bottom: 1rem;
            order: 2;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        #login-error {
            display: none;
            color: red;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        .footer {
            color: white;
            font-size: 0.75rem;
            text-align: center;
            padding-top: 1rem;
            order: 3;
        }
        .footer a { color: white; text-decoration: underline; }
        form { width: 100%; }
    </style>
</head>
<body>
    <h1 class="login-title">Sistema de Gestión de Máquinas e Inventario - SIMio Ver 1.1</h1>
    <div class="login-container">
        <form id="form-login" class="space-y-4">
            <h2 class="text-2xl font-semibold text-gray-800 text-center mb-6">Iniciar Sesión</h2>
            <div>
                <label for="username" class="block text-gray-600 text-sm font-bold mb-2">Usuario:</label>
                <input type="text" id="username" name="username" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <div>
                <label for="password" class="block text-gray-600 text-sm font-bold mb-2">Contraseña:</label>
                <input type="password" id="password" name="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <button type="submit" id="btnLogin" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">
                Iniciar Sesión
            </button>
            <div id="login-error" class="text-red-500 text-sm italic" style="display: none;"></div>
        </form>
    </div>

    <footer class="footer">
        <p>© 2025 GEOWAY, Technology-Based initiative - IBT. All rights reserved. Berlin - Germany <a href="https://geo-way.github.io/GeoWay.io/index.html">GEOWAY</a></p>
    </footer>

<script>
    const API_BASE = "https://gsmio-production-3b4c.up.railway.app";

    document.getElementById("form-login").addEventListener("submit", async function(event) {
        event.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const btnLogin = document.getElementById("btnLogin");
        const errorDiv = document.getElementById("login-error");

        // Deshabilitar botón mientras espera respuesta
        btnLogin.disabled = true;
        btnLogin.textContent = "Verificando...";
        errorDiv.style.display = "none";

        try {
            const res = await fetch(`${API_BASE}/api/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('user', data.user);
                localStorage.setItem('role', data.role);
                window.location.href = "inventario.html";
            } else {
                errorDiv.textContent = data.error || "Credenciales incorrectas. Por favor, inténtelo de nuevo.";
                errorDiv.style.display = "block";
            }
        } catch (err) {
            errorDiv.textContent = "Error de conexión con el servidor. Inténtelo de nuevo.";
            errorDiv.style.display = "block";
            console.error("Error en login:", err);
        } finally {
            btnLogin.disabled = false;
            btnLogin.textContent = "Iniciar Sesión";
        }
    });
</script>

</body>
</html>
